name: Release build
run-name: Release job triggered by ${{ github.event_name }} on ${{ github.ref_name }}

on:
  pull_request:
    branches: [master]
    types: [opened, labeled, unlabeled, closed]
  issue_comment:
    types: [created]

jobs:
  validate-for-release:
    if: |
      (github_event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'labeled' || github.event.action == 'unlabeled')) ||
      (github_event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/valiate-for-release'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        id: checkout
      - name: Validate for release
        uses: ./
        id: validate_for_release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull_request_id: ${{ github.event.number }}
          mode: validate

  create-release:
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        id: checkout
      - name: Create release
        uses: ./
        id: create_release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull_request_id: ${{ github.event.number }}
          mode: release
